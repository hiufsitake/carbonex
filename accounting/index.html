['mousemove','keydown','click','touchstart'].forEach(e=>document.addEventListener(e,resetIT));

async function init() {

const MODULE_TITLES = {dashboard:'Dashboard',customers:'Customers',invoices:'Tax Invoices',dos:'Delivery Orders',vouchers:'Payment Vouchers',creditnotes:'Credit / Debit Notes',aging:'Aging Report',sst:'SST Summary'};

function switchModule(mod) {
    document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
    const nav=document.getElementById('nav-'+mod);
    if(nav) nav.classList.add('active');
    document.getElementById('page-title').textContent = MODULE_TITLES[mod]||mod;
    document.getElementById('content').innerHTML = '<div style="text-align:center;padding:40px;color:#94a3b8;font-size:13px">Loading...</div>';

    if(fn[mod]) fn[mod]();
}

async function autoNumber(table, field, prefix) {
    const now=new Date();
    const ym=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}`;
    const {data} = await sb.from(table).select(field).like(field,`${prefix}-${ym}%`).order('created_at',{ascending:false}).limit(1);
    let next=1;
    if(data?.length){ const p=data[0][field].split('-'); const n=parseInt(p[p.length-1],10); if(!isNaN(n)) next=n+1; }
    return `${prefix}-${ym}-${String(next).padStart(3,'0')}`;
}

function calcItems(items) {
    let sub=0,sst=0;
    (items||[]).forEach(it=>{
        const line=(parseFloat(it.qty)||0)*(parseFloat(it.unit_price)||0);
        const rate=SST_RATES.find(r=>r.code===(it.sst_code||'EX'))?.rate||0;
        sub+=line; sst+=line*rate;
    });
    return {subtotal:sub,sst,total:sub+sst};
}

function badge(s) {
    const m={paid:'b-paid',pending:'b-pending',overdue:'b-overdue',draft:'b-draft',delivered:'b-delivered',approved:'b-approved',invoiced:'b-invoiced',credit:'b-credit',debit:'b-debit'};
    return `<span class="badge ${m[s]||'b-pending'}">${s}</span>`;
}

function showToast(msg,type='success') {
    let t=document.getElementById('_toast');
    if(!t){t=document.createElement('div');t.id='_toast';document.body.appendChild(t);}
    t.style.cssText=`position:fixed;bottom:24px;right:24px;z-index:9999;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:700;color:#fff;background:${type==='success'?'#2d6a27':'#ef4444'};box-shadow:0 8px 24px rgba(0,0,0,0.2);transition:opacity 0.4s;opacity:1`;
    t.textContent=msg;
    clearTimeout(t._tid);
    t._tid=setTimeout(()=>t.style.opacity='0',3000);
}

function showModal(html) {

}
function closeModal(){ document.getElementById('modal-container').innerHTML=''; }

async function renderDashboard() {
    const [ir,dr,vr,cr] = await Promise.all([
        sb.from('acc_invoices').select('status,total,inv_number,customer_id,created_at'),
        sb.from('acc_delivery_orders').select('status'),
        sb.from('acc_vouchers').select('status,amount,pv_number,payee,created_at'),
        sb.from('acc_customers').select('id'),
    ]);
    const invs=ir.data||[], dos=dr.data||[], pvs=vr.data||[];
    const totalInv=invs.reduce((s,i)=>s+(i.total||0),0);
    const paidInv=invs.filter(i=>i.status==='paid').reduce((s,i)=>s+(i.total||0),0);
    const outInv=invs.filter(i=>i.status==='pending'||i.status==='overdue').reduce((s,i)=>s+(i.total||0),0);
    const ovdInv=invs.filter(i=>i.status==='overdue').reduce((s,i)=>s+(i.total||0),0);
    document.getElementById('content').innerHTML=`
    <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">Total Invoiced</div><div class="stat-value">${fmtRM(totalInv)}</div><div class="stat-sub">${invs.length} invoices</div></div>
        <div class="stat-card" style="border-color:#6ee7b7"><div class="stat-label">Collected</div><div class="stat-value" style="color:#10b981">${fmtRM(paidInv)}</div><div class="stat-sub">${invs.filter(i=>i.status==='paid').length} paid</div></div>
        <div class="stat-card" style="border-color:#fde68a"><div class="stat-label">Outstanding</div><div class="stat-value" style="color:#f59e0b">${fmtRM(outInv)}</div><div class="stat-sub">${invs.filter(i=>i.status==='pending'||i.status==='overdue').length} invoices</div></div>
        <div class="stat-card" style="border-color:#fecaca"><div class="stat-label">Overdue</div><div class="stat-value" style="color:#ef4444">${fmtRM(ovdInv)}</div><div class="stat-sub">${invs.filter(i=>i.status==='overdue').length} invoices</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="tbl-wrap">
            <div class="tbl-head"><span class="tbl-title">Recent Invoices</span><button class="btn btn-dark btn-sm" onclick="switchModule('invoices')">View All</button></div>
            <table><thead><tr><th>Invoice No.</th><th>Total</th><th>Status</th></tr></thead><tbody>
            ${invs.slice(0,6).map(i=>`<tr onclick="switchModule('invoices')"><td style="font-weight:700;color:#0d1f0d;font-size:11px">${esc(i.inv_number||'—')}</td><td style="font-size:11px;font-family:monospace">${fmtRM(i.total)}</td><td>${badge(i.status)}</td></tr>`).join('')||'<tr><td colspan="3" style="text-align:center;color:#94a3b8;padding:18px;font-size:12px">No invoices yet</td></tr>'}
            </tbody></table>
        </div>
        <div class="tbl-wrap">

            <table><thead><tr><th>PV No.</th><th>Payee</th><th>Amount</th></tr></thead><tbody>
            ${pvs.slice(0,6).map(v=>`<tr onclick="switchModule('vouchers')"><td style="font-weight:700;color:#0d1f0d;font-size:11px">${esc(v.pv_number||'—')}</td><td style="font-size:11px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(v.payee||'—')}</td><td style="font-size:11px;font-family:monospace">${fmtRM(v.amount)}</td></tr>`).join('')||'<tr><td colspan="3" style="text-align:center;color:#94a3b8;padding:18px;font-size:12px">No vouchers yet</td></tr>'}

async function printInvoicePDF(id){
    const {data:inv}=await sb.from('acc_invoices').select('*').eq('id',id).single();if(!inv)return;
    let cust=null;
    if(inv.customer_id){const {data}=await sb.from('acc_customers').select('*').eq('id',inv.customer_id).single();cust=data;}
    const {jsPDF}=window.jspdf;const doc=new jsPDF();
    doc.setFont('helvetica','bold').setFontSize(15).text(CO.name,14,22);
    doc.setFont('helvetica','normal').setFontSize(8).setTextColor(100,100,100);
    if(CO.reg)doc.text('SSM: '+CO.reg,14,28);
    if(CO.address)doc.text(doc.splitTextToSize(CO.address,90),14,32);
    doc.setFont('helvetica','bold').setFontSize(18).setTextColor(150,20,10).text('TAX INVOICE',196,22,{align:'right'});
    doc.setFontSize(11).setTextColor(0,0,0).text(inv.inv_number,196,30,{align:'right'});
    doc.setDrawColor(200,200,200).line(14,48,196,48);
    doc.setFont('helvetica','bold').setFontSize(8).setTextColor(100,100,100).text('BILL TO',14,56);
    doc.setFont('helvetica','normal').setFontSize(11).setTextColor(0,0,0).text(cust?.name||'—',14,62);
    if(cust?.address)doc.setFontSize(8).setTextColor(100,100,100).text(doc.splitTextToSize(cust.address,90),14,68);
    if(cust?.tin)doc.text('TIN: '+cust.tin,14,82);
    doc.setFontSize(8).setTextColor(100,100,100);
    doc.text('Invoice Date: '+fmtDate(inv.date),130,56);
    doc.text('Due Date: '+fmtDate(inv.due_date),130,62);
    if(inv.do_ref)doc.text('DO Ref: '+inv.do_ref,130,68);
    const {subtotal,sst,total}=calcItems(inv.items||[]);
    doc.autoTable({startY:92,head:[['#','Description','Qty','Unit','Unit Price','SST','Amount']],body:(inv.items||[]).map((it,i)=>{const line=(it.qty||0)*(it.unit_price||0);const rate=SST_RATES.find(r=>r.code===(it.sst_code||'EX'))?.rate||0;return[i+1,it.desc,it.qty,it.unit||'',parseFloat(it.unit_price||0).toFixed(2),rate>0?(line*rate).toFixed(2):'—',(line+line*rate).toFixed(2)];}),theme:'grid',headStyles:{fillColor:[13,31,13],fontSize:8},bodyStyles:{fontSize:9},columnStyles:{4:{halign:'right'},5:{halign:'right'},6:{halign:'right'}}});
    const fy=doc.lastAutoTable.finalY+8;
    doc.setFont('helvetica','normal').setFontSize(10);
    doc.text('Subtotal (excl. SST):',130,fy);doc.text(fmtRM(subtotal),196,fy,{align:'right'});
    doc.text('SST Amount:',130,fy+7);doc.text(fmtRM(sst),196,fy+7,{align:'right'});
    doc.setFont('helvetica','bold').setFontSize(12);
    doc.text('TOTAL DUE (MYR):',130,fy+16);doc.text(fmtRM(total),196,fy+16,{align:'right'});
    if(inv.notes)doc.setFont('helvetica','normal').setFontSize(8).setTextColor(100,100,100).text(doc.splitTextToSize('Notes: '+inv.notes,100),14,fy+6);
    doc.setFontSize(7).setTextColor(150,150,150).text('Computer-generated Tax Invoice — CARBONEX VENTURES SDN. BHD.',14,285);
    doc.save(inv.inv_number+'.pdf');
}

// ── AGING REPORT ──────────────────────────────────────────────────────────────
async function renderAging(){
    const [ir,cr]=await Promise.all([sb.from('acc_invoices').select('*').in('status',['pending','overdue']),sb.from('acc_customers').select('id,name')]);
    const invs=ir.data||[],cmap=Object.fromEntries((cr.data||[]).map(c=>[c.id,c.name]));
    const now=new Date();
    const aged=invs.map(inv=>{const due=new Date((inv.due_date||inv.date)+'T00:00:00');const days=Math.floor((now-due)/(864e5));return{...inv,days:Math.max(0,days),cn:cmap[inv.customer_id]||'—'};});
    const buckets=[{l:'Current (0–30)',min:0,max:30,items:[]},{l:'31–60 Days',min:31,max:60,items:[]},{l:'61–90 Days',min:61,max:90,items:[]},{l:'Over 90 Days',min:91,max:Infinity,items:[]}];
    aged.forEach(inv=>{const b=buckets.find(b=>inv.days>=b.min&&inv.days<=b.max);if(b)b.items.push(inv);});
    const total=aged.reduce((s,i)=>s+(i.total||0),0);
    const cols=['#10b981','#f59e0b','#ef4444','#991b1b'],bcols=['#6ee7b7','#fde68a','#fecaca','#fecaca'];
    document.getElementById('content').innerHTML=`
    <div class="stat-grid">
        ${buckets.map((b,i)=>`<div class="stat-card" style="border-color:${bcols[i]}"><div class="stat-label">${b.l}</div><div class="stat-value" style="font-size:15px;color:${cols[i]}">${fmtRM(b.items.reduce((s,x)=>s+(x.total||0),0))}</div><div class="stat-sub">${b.items.length} invoice(s)</div></div>`).join('')}
    </div>
    <div class="tbl-wrap" style="margin-bottom:12px"><div class="tbl-head"><span class="tbl-title">Total Outstanding: ${fmtRM(total)}</span></div></div>
    ${buckets.map((b,bi)=>b.items.length?`<div class="tbl-wrap" style="margin-bottom:12px">
        <div class="tbl-head"><span class="tbl-title" style="color:${cols[bi]}">${b.l}</span></div>
        <table><thead><tr><th>Invoice No.</th><th>Customer</th><th>Date</th><th>Due</th><th>Days Overdue</th><th>Amount</th></tr></thead><tbody>
        ${b.items.map(inv=>`<tr onclick="viewInvoice('${inv.id}')"><td style="font-weight:700;color:#0d1f0d">${esc(inv.inv_number)}</td><td>${esc(inv.cn)}</td><td style="color:#94a3b8;font-size:11px">${fmtDate(inv.date)}</td><td style="color:#ef4444;font-size:11px">${fmtDate(inv.due_date)}</td><td style="font-weight:700;color:${inv.days>60?'#ef4444':inv.days>30?'#f59e0b':'#10b981'}">${inv.days} days</td><td style="font-family:monospace;font-weight:700">${fmtRM(inv.total)}</td></tr>`).join('')}
        </tbody></table>
    </div>`:'').join('')||'<div style="text-align:center;padding:40px;color:#10b981;font-size:13px;font-weight:600">✓ No outstanding invoices!</div>'}`;
    lucide.createIcons();
}

        <div class="stat-card" style="border-color:#fde68a"><div class="stat-label">Total SST Collected</div><div class="stat-value" style="font-size:15px;color:#f59e0b">${fmtRM(totalSST)}</div><div class="stat-sub">${all.length} paid invoices</div></div>
        <div class="stat-card"><div class="stat-label">Service Tax 6% (S6)</div><div class="stat-value" style="font-size:15px">${fmtRM(s6)}</div><div class="stat-sub">S6 code</div></div>
        <div class="stat-card"><div class="stat-label">Sales Tax 10% (ST10)</div><div class="stat-value" style="font-size:15px">${fmtRM(st10)}</div><div class="stat-sub">ST10 code</div></div>
        <div class="stat-card"><div class="stat-label">Sales Tax 5% (ST5)</div><div class="stat-value" style="font-size:15px">${fmtRM(st5)}</div><div class="stat-sub">ST5 code</div></div>
    </div>
    <div class="tbl-wrap">
        <div class="tbl-head"><span class="tbl-title">Paid Invoices — SST Breakdown</span></div>
        <div style="overflow-x:auto"><table><thead><tr><th>Invoice No.</th><th>Date</th><th>Subtotal</th><th>S6 (6%)</th><th>ST10 (10%)</th><th>ST5 (5%)</th><th>Total SST</th><th>Invoice Total</th></tr></thead><tbody>
        ${all.map(inv=>{let iS6=0,iST10=0,iST5=0;(inv.items||[]).forEach(it=>{const line=(it.qty||0)*(it.unit_price||0);if(it.sst_code==='S6')iS6+=line*0.06;if(it.sst_code==='ST10')iST10+=line*0.10;if(it.sst_code==='ST5')iST5+=line*0.05;});const tSST=iS6+iST10+iST5;return`<tr><td style="font-weight:700;color:#0d1f0d">${esc(inv.inv_number)}</td><td style="color:#94a3b8;font-size:11px">${fmtDate(inv.date)}</td><td style="font-family:monospace">${fmtRM(inv.subtotal)}</td><td style="font-family:monospace;color:#f59e0b">${iS6>0?fmtRM(iS6):'—'}</td><td style="font-family:monospace;color:#f59e0b">${iST10>0?fmtRM(iST10):'—'}</td><td style="font-family:monospace;color:#f59e0b">${iST5>0?fmtRM(iST5):'—'}</td><td style="font-family:monospace;font-weight:700;color:#f59e0b">${fmtRM(tSST)}</td><td style="font-family:monospace;font-weight:700">${fmtRM(inv.total)}</td></tr>`;}).join('')||'<tr><td colspan="8" style="text-align:center;color:#94a3b8;padding:28px;font-size:12px">No paid invoices yet.</td></tr>'}
        </tbody></table></div>
    </div>`;
    lucide.createIcons();
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
