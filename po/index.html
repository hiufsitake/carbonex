<body class="min-h-screen pb-24 text-slate-900">

    <img id="pdf-logo" src="../carbonex letterhead.jpg" style="display:none;" crossorigin="anonymous">

    <nav class="bg-white p-5 sticky top-0 z-50 shadow-sm border-b border-slate-100">

                <button onclick="switchTab('history')" id="nav-history" class="px-4 py-2 rounded-xl text-[10px] font-bold text-slate-400 hover:text-slate-600 uppercase transition-all tracking-widest">Archive</button>
                <button onclick="switchTab('admin')" id="nav-admin" class="px-4 py-2 rounded-xl text-[10px] font-bold text-slate-400 hover:text-slate-600 uppercase transition-all tracking-widest hidden">Admin</button>

    <main class="max-w-4xl mx-auto p-4 mt-4 space-y-6">
        
        <div id="auth-lock-screen" class="hidden p-12 text-center bg-white rounded-[2rem] shadow-sm border border-slate-100 space-y-4">

        <div id="tab-create">

                        <input type="text" id="po-number" class="input-box text-slate-500 bg-slate-50 cursor-not-allowed" readonly placeholder="PO Number">
                        <input type="date" id="po-date" class="input-box" required>
                        <input type="text" id="project-ref" placeholder="Project Number (Optional)" class="input-box focus:border-[#2d6a27]/30">
                        <input type="text" id="req-name" class="input-box text-slate-500 bg-slate-50 cursor-not-allowed" readonly placeholder="Requestor Name">
                        <input type="text" id="req-email" class="input-box text-slate-500 bg-slate-50 cursor-not-allowed" readonly placeholder="Requestor Email">
                    </section>
                    
                    <section class="bg-white p-6 rounded-[2rem] shadow-[0_2px_10px_-3px_rgba(6,81,237,0.05)] border border-slate-100/50 flex flex-col space-y-4">

                        <input type="text" id="supplier-name" placeholder="Supplier / Contractor Name" class="input-box" required>
                        <textarea id="delivery-address" placeholder="Full Supplier Address (e.g. NO. 62A, LORONG 1, JALAN TAPAH...)" class="input-box flex-1 min-h-[80px] resize-none"></textarea>
                        <input type="text" id="supplier-contact" placeholder="Contact Person (Attn)" class="input-box">
                        <input type="text" id="supplier-tel" placeholder="Telephone / Email" class="input-box">
                    </section>
                </div>

                <section class="bg-white p-6 rounded-[2rem] shadow-[0_2px_10px_-3px_rgba(6,81,237,0.05)] border border-slate-100/50">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="font-black uppercase text-[10px] tracking-widest text-slate-400">ITEMIZED LIST</h2>
                        <button type="button" onclick="addItemRow()" class="bg-[#ecfdf5] text-[#10b981] px-4 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center gap-1.5 hover:bg-[#d1fae5] transition-all">
                            <i data-lucide="plus-circle" class="w-3.5 h-3.5"></i> Add Item
                        </button>
                    </div>
                    
                    <div class="grid grid-cols-12 gap-2 px-4 mb-2 text-[9px] font-black uppercase tracking-widest text-slate-400">
                        <div class="col-span-5">Description</div>
                        <div class="col-span-2 text-center">Qty</div>
                        <div class="col-span-2 text-right">Price</div>
                        <div class="col-span-2 text-right">Total</div>
                        <div class="col-span-1 text-center"></div>
                    </div>

                    <div id="items-list" class="space-y-2 mb-6"></div>
                    
                    <div class="flex justify-between items-end pt-4 border-t border-slate-100 mt-4">
                        <textarea id="remarks" placeholder="Add additional remarks / T&C..." class="input-box w-1/2 h-[60px] resize-none bg-transparent border-slate-200" rows="1"></textarea>
                        <div class="text-right">
                            <p class="text-[9px] font-black uppercase text-slate-400 tracking-widest mb-1">TOTAL AMOUNT</p>
                            <p id="total-display" class="text-3xl font-black text-[#0f172a] tracking-tight">RM 0.00</p>
                        </div>
                    </div>
                </section>

                <div class="flex gap-4">
                    <button type="button" onclick="previewPDF()" class="flex-1 bg-[#f0f9ff] text-[#0284c7] font-black p-5 rounded-[1.5rem] uppercase tracking-widest text-xs flex justify-center items-center gap-2 hover:bg-[#e0f2fe] transition-all">
                        <i data-lucide="eye" class="w-4 h-4"></i> Preview PDF
                    </button>
                    <button type="submit" id="submit-btn" class="flex-[2] bg-[#0f172a] text-white font-black p-5 rounded-[1.5rem] shadow-xl shadow-slate-200 uppercase tracking-widest text-xs flex justify-center items-center gap-2 hover:bg-[#1e293b] transition-all transform hover:-translate-y-0.5">

                <button type="button" onclick="saveDraft()" class="w-full bg-[#f8fafc] text-[#64748b] border-2 border-slate-100 font-black p-4 rounded-[1.5rem] uppercase tracking-widest text-[10px] flex justify-center items-center gap-2 hover:bg-slate-100 hover:text-slate-900 transition-all">
                    <i data-lucide="save" class="w-3.5 h-3.5"></i> Save As Draft
                </button>
                
                <button type="button" onclick="cancelEdit()" id="cancel-edit-btn" class="hidden w-full text-red-400 font-black p-4 uppercase tracking-widest text-[10px] hover:bg-red-50 rounded-[1.5rem] transition-all">
                    Cancel Editing
                </button>
            </form>
        </div>

        <div id="tab-review" class="hidden">
            <div id="review-list" class="space-y-4"></div>
        </div>
        
        <div id="tab-history" class="hidden space-y-4">
            <div class="relative">
                <i data-lucide="search" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="search-box" placeholder="Search PO Number or Supplier..." oninput="renderHistory()" class="input-box pl-10 bg-white border-slate-200 focus:border-[#2d6a27] shadow-sm">
            </div>
            <div id="history-list" class="space-y-3"></div>
        </div>
        
        <div id="tab-admin" class="hidden">
            <section class="bg-white p-10 rounded-[2rem] shadow-sm border border-slate-100 text-center space-y-6">
                <div class="bg-slate-50 w-20 h-20 mx-auto rounded-full flex items-center justify-center">
                    <i data-lucide="database" class="w-8 h-8 text-[#2d6a27]"></i>
                </div>
                <div>
                    <h2 class="font-black uppercase text-sm tracking-tight text-slate-800">System Administration</h2>
                    <p class="text-xs text-slate-400 font-bold mt-1">Export database records and manage settings.</p>
                </div>
                <button onclick="exportCSV()" class="w-full max-w-sm mx-auto bg-[#0f172a] text-white p-5 rounded-[1.5rem] font-black uppercase text-xs tracking-widest flex items-center justify-center gap-2 hover:bg-[#1e293b] transition-all">
                    <i data-lucide="download" class="w-4 h-4"></i> Export All POs (CSV)

            <p class="text-[9px] font-black uppercase tracking-[0.5em] text-slate-400">© 2026 ALL RIGHTS RESERVED.</p>
        </footer>

    <script>
        // ============================================================
        // CONFIGURATION
        // ============================================================
        const SUPABASE_URL   = GUARD_URL; 
        const SUPABASE_KEY   = GUARD_KEY; 
        
        const ADMIN_EMAILS   = ['admin@carbonexventures.com', 'hiu.fs.itake@gmail.com']; 
        
        const APPROVER_MAP   = { 
            'admin@carbonexventures.com': 'ADMIN',
            'hiu.fs.itake@gmail.com': 'HFS' 
        }; 
        
        const CO = {
            name: 'CARBONEX VENTURES SDN. BHD.',
            reg:  '202601013376 (1675474-X)', 
            email:'carbonexventures2026@gmail.com',
            address: 'UNIT 906-3-04, SOON HUP TOWER (2ND FLOOR), JALAN MAJU, 98000 MIRI, SARAWAK',
            tel:  '084309048'
        };

        // ============================================================
        // INITIALIZATION & STATE
        // ============================================================
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentPOs = [];
        let isAuthorized = false;
        let editingId = null;
        let currentApproverInitials = '';
        let inactivityTimeout;

        const formatRM = (num) => parseFloat(num || 0).toLocaleString('en-MY', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const mkRow = (label, value) => `<tr><td style="padding:6px 0;color:#64748b;font-size:11px;font-weight:700">${label}</td><td style="padding:6px 0;color:#0f172a;font-size:13px;font-weight:700;text-align:right">${value}</td></tr>`;

        function resetInactivityTimer() {
            clearTimeout(inactivityTimeout);
            inactivityTimeout = setTimeout(async () => {
                await supabaseClient.auth.signOut();
                window.location.href = '../index.html';
            }, 900000); 
        }
        
        ['mousemove', 'keypress', 'click', 'scroll', 'touchstart'].forEach(event => {
            document.addEventListener(event, resetInactivityTimer);
        });
        resetInactivityTimer();

        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            
            if (session && ADMIN_EMAILS.includes(session.user.email)) {
                isAuthorized = true;
                document.getElementById('nav-admin').classList.remove('hidden');
            }
            
            if (session?.user) {
                currentApproverInitials = APPROVER_MAP[session.user.email] || session.user.email.split('@')[0].toUpperCase().substring(0, 3);
                if (session.user.email === 'hiu.fs.itake@gmail.com') {
                    document.getElementById('req-name').value = 'Hiu Fu Shun';
                } else {
                    document.getElementById('req-name').value = session.user.email.split('@')[0];
                }
                document.getElementById('req-email').value = session.user.email;
            }
            
            addItemRow();
            await setAutoPONumber();
            lucide.createIcons();
        }

        // ============================================================
        // UI MANIPULATION & FORMS
        // ============================================================
        function switchTab(tab) {
            const adminTabs = ['review', 'admin'];
            
            if (adminTabs.includes(tab) && !isAuthorized) {
                document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden'));
                document.getElementById('auth-lock-screen').classList.remove('hidden');
            } else {
                document.getElementById('auth-lock-screen').classList.add('hidden');
                document.querySelectorAll('main > div').forEach(div => {
                    div.classList.toggle('hidden', div.id !== `tab-${tab}`);
                });
                
                if (['review', 'history', 'admin'].includes(tab)) {
                    fetchRecords();
                }
            }
            
            document.querySelectorAll('nav button').forEach(btn => {
                const isActive = btn.id === `nav-${tab}`;
                btn.className = `px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition-all tracking-widest ${isActive ? 'tab-active' : 'text-slate-400 hover:text-slate-600'}`;
            });
            
            lucide.createIcons();
        }

        async function setAutoPONumber() {
            if (editingId) return;
            
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const dateString = `${year}${month}${day}`;
            
            try {
                const { count } = await supabaseClient
                    .from('po_logs')
                    .select('*', { count: 'exact', head: true })
                    .gte('created_at', `${year}-${month}-01`);
                
                const sequence = String((count || 0) + 1).padStart(2, '0');
                document.getElementById('po-number').value = `PO-${dateString}-${sequence}`;
                document.getElementById('po-date').value = now.toISOString().split('T')[0];
            } catch (error) {
                console.error("Failed to generate PO number", error);
            }
        }

        function addItemRow(desc = '', qty = '', price = '') {
            const container = document.getElementById('items-list');
            const div = document.createElement('div');
            
            div.className = 'item-row grid grid-cols-12 gap-2 bg-[#f8fafc] p-2 rounded-2xl items-center border border-slate-100 hover:border-slate-200 transition-all';
            
            const lineTotal = (parseFloat(qty)||0) * (parseFloat(price)||0);
            
            div.innerHTML = `
                <input type="text" placeholder="Description" value="${desc}" class="col-span-5 bg-transparent font-bold text-xs text-slate-700 outline-none px-2 py-1" required>
                <input type="number" placeholder="Qty" value="${qty}" min="0" class="col-span-2 bg-transparent font-bold text-xs text-slate-700 outline-none text-center" oninput="updateRowTotal(this)" required>
                <input type="number" step="0.01" placeholder="Price" value="${price}" class="col-span-2 bg-transparent font-bold text-xs text-slate-700 outline-none text-right" oninput="updateRowTotal(this)" required>
                <div class="col-span-2 text-right font-black text-xs text-slate-400 row-total px-2">${lineTotal > 0 ? formatRM(lineTotal) : '-'}</div>
                <button type="button" onclick="this.parentElement.remove(); updateTotal();" class="col-span-1 text-red-300 hover:text-red-500 flex justify-center p-1 rounded-lg hover:bg-red-50 transition-all">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
            `;
            container.appendChild(div);
            lucide.createIcons();
            updateTotal();
        }

        function updateRowTotal(el) {
            const row = el.closest('.item-row');
            const inputs = row.querySelectorAll('input');
            const qty = parseFloat(inputs[1].value) || 0;
            const price = parseFloat(inputs[2].value) || 0;
            const total = qty * price;
            row.querySelector('.row-total').innerText = total > 0 ? formatRM(total) : '-';
            updateTotal();
        }

        function updateTotal() {
            let total = 0;
            document.querySelectorAll('.item-row').forEach(row => {
                const inputs = row.querySelectorAll('input');
                const qty = parseFloat(inputs[1].value) || 0;
                const price = parseFloat(inputs[2].value) || 0;
                total += (qty * price);
            });
            document.getElementById('total-display').innerText = `RM ${formatRM(total)}`;
        }

        function getFormData() {
            const items = [];
            let total = 0;
            
            document.querySelectorAll('.item-row').forEach(row => {
                const inputs = row.querySelectorAll('input');
                const desc = inputs[0].value;
                const qty = parseFloat(inputs[1].value) || 0;
                const price = parseFloat(inputs[2].value) || 0;
                
                if (desc || qty > 0) {
                    total += (qty * price);
                    items.push({ description: desc, qty: qty, unit_price: price, total: qty * price });
                }
            });
            
            return {
                po_number: document.getElementById('po-number').value,
                date: document.getElementById('po-date').value,
                category: 'General',
                supplier_name: document.getElementById('supplier-name').value,
                supplier_contact: document.getElementById('supplier-contact').value,
                supplier_tel: document.getElementById('supplier-tel').value,
                project_ref: document.getElementById('project-ref').value,
                delivery_address: document.getElementById('delivery-address').value,
                remarks: document.getElementById('remarks').value,
                items: items,
                total: total,
                status: 'Pending'
            };
        }

        // ============================================================
        // DATA FETCHING & RENDERING
        // ============================================================
        async function fetchRecords() {
            const { data, error } = await supabaseClient
                .from('po_logs')
                .select('*')
                .order('created_at', { ascending: false });
                
            if (!error) {
                currentPOs = data || [];
                renderReview();
                renderHistory();
            }
        }

        function renderReview() {
            const pendingPOs = currentPOs.filter(p => p.status === 'Pending');
            const container = document.getElementById('review-list');
            
            if (pendingPOs.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 px-6 bg-white rounded-[2rem] border border-slate-100 shadow-sm">
                        <i data-lucide="check-circle-2" class="w-10 h-10 mx-auto text-[#2d6a27] mb-4 opacity-50"></i>
                        <p class="text-xs font-black uppercase tracking-widest text-slate-400">All Caught Up</p>
                        <p class="text-[10px] font-bold text-slate-300 mt-1">No purchase orders await your review.</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            container.innerHTML = pendingPOs.map(po => `
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 space-y-5">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="inline-block px-2 py-1 bg-slate-50 rounded-lg text-[8px] font-black text-[#2d6a27] uppercase tracking-widest mb-2">${po.category || 'General'}</span>
                            <h3 class="font-black text-lg text-slate-900 tracking-tight leading-none">${po.po_number}</h3>
                            <p class="text-xs font-bold text-slate-500 mt-2">${po.supplier_name}</p>
                            ${po.project_ref ? `<p class="text-[10px] font-bold text-slate-400 mt-0.5">Ref: ${po.project_ref}</p>` : ''}
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Value</p>
                            <p class="text-xl font-black text-[#0f172a] leading-none">RM ${formatRM(po.total)}</p>
                            <button onclick="generatePDF('${po.id}')" class="mt-3 bg-[#f8fafc] text-slate-600 px-3 py-1.5 rounded-xl font-black text-[9px] uppercase tracking-widest flex items-center gap-1.5 ml-auto hover:bg-slate-100 transition-all">
                                <i data-lucide="file-text" class="w-3 h-3"></i> View PDF
                            </button>
                        </div>
                    </div>
                    <div class="bg-slate-50 px-4 py-2 rounded-xl text-[9px] font-black text-slate-400 text-center uppercase tracking-widest border border-slate-100">
                        Action Required by <span class="text-[#2d6a27]">${currentApproverInitials || '&mdash;'}</span>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="handleStatusChange('${po.id}','Approved')" class="flex-[2] bg-[#2d6a27] text-white py-4 rounded-[1rem] font-black text-xs uppercase tracking-widest hover:bg-[#1a4a18] transition-all flex justify-center items-center gap-2">
                            <i data-lucide="check" class="w-4 h-4"></i> Approve
                        </button>
                        <button onclick="handleStatusChange('${po.id}','Rejected')" class="flex-1 bg-white text-red-500 border border-red-100 py-4 rounded-[1rem] font-black text-xs uppercase tracking-widest hover:bg-red-50 transition-all flex justify-center items-center gap-2">
                            <i data-lucide="x" class="w-4 h-4"></i> Reject
                        </button>
                    </div>
                </div>
            `).join('');
            
            lucide.createIcons();
        }

        function renderHistory() {
            const query = (document.getElementById('search-box')?.value || '').toLowerCase();
            const container = document.getElementById('history-list');
            
            const filteredPOs = currentPOs.filter(p => {
                const poMatch = p.po_number?.toLowerCase().includes(query);
                const supplierMatch = p.supplier_name?.toLowerCase().includes(query);
                return !query || poMatch || supplierMatch;
            });

            if (filteredPOs.length === 0) {
                container.innerHTML = '<div class="text-center p-10 text-slate-300 font-bold text-xs">No records matched your search.</div>';
                return;
            }

            container.innerHTML = filteredPOs.map(po => `
                <div class="bg-white p-5 rounded-[1.5rem] border border-slate-100 shadow-sm flex justify-between items-center gap-4 hover:border-slate-200 transition-all">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <h3 class="font-black text-slate-800 text-sm tracking-tight">${po.po_number}</h3>
                            <span class="status-${po.status.toLowerCase()} px-2 py-0.5 rounded-md text-[8px] font-black uppercase tracking-widest">${po.status}</span>
                        </div>
                        <p class="text-[10px] font-bold text-slate-500 truncate">${po.supplier_name}</p>
                        <div class="flex items-center gap-2 mt-1">
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">${po.date || ''}</p>
                            <span class="text-slate-300 text-[8px]">|</span>
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">RM ${formatRM(po.total)}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 shrink-0">
                        <button onclick="generatePDF('${po.id}')" class="p-3 bg-slate-50 text-slate-500 rounded-xl hover:bg-[#2d6a27] hover:text-white transition-all">
                            <i data-lucide="printer" class="w-4 h-4"></i>
                        </button>
                        ${(po.status === 'Rejected' || po.status === 'Draft') ? 
                            `<button onclick="loadForEdit('${po.id}')" class="p-3 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-100 transition-all"><i data-lucide="edit-3" class="w-4 h-4"></i></button>` : ''}
                        ${isAuthorized ? 
                            `<button onclick="deletePO('${po.id}')" class="p-3 bg-white border border-red-100 text-red-400 rounded-xl hover:bg-red-50 transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
                    </div>
                </div>
            `).join('');
            
            lucide.createIcons();
        }

        // ============================================================
        // SUPABASE EDGE FUNCTION TRIGGER FOR RESEND
        // ============================================================
        async function triggerResendEmail(title, header_bg, poData, remark_text) {
            const html_body = mkRow('PO No', poData.po_number) +
                              mkRow('Supplier', poData.supplier_name) +
                              mkRow('Total', 'RM ' + formatRM(poData.total)) +
                              (poData.approved_by ? mkRow('Action By', poData.approved_by) : '');

            try {
                const { data, error } = await supabaseClient.functions.invoke('send-po-email', {
                    body: { title, header_bg, html_body, remark_text }
                });
                if (error) console.error('Failed to send email:', error);
            } catch(e) {
                console.error("Edge function call failed: ", e);
            }
        }

        // ============================================================
        // DATABASE ACTIONS (CRUD)
        // ============================================================
        document.getElementById('po-form').onsubmit = async function(e) {
            e.preventDefault();
            const payload = getFormData();
            
            if (payload.items.length === 0) {
                alert("Please add at least one line item.");
                return;
            }

            const btn = document.getElementById('submit-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Processing...';
            lucide.createIcons();

            let res;
            if (editingId) {
                res = await supabaseClient.from('po_logs').update(payload).eq('id', editingId);
            } else {
                res = await supabaseClient.from('po_logs').insert(payload);
            }
            
            if (!res.error) {
                await triggerResendEmail(
                    editingId ? 'PO Resubmitted' : 'New Purchase Order', 
                    '#0f172a', 
                    payload, 
                    'Please review via CARBONEX Portal.'
                );
                
                alert(editingId ? 'PO Updated & Resubmitted.' : 'PO Submitted Successfully.');
                cancelEdit();
                
                if (isAuthorized) fetchRecords();
            } else {
                alert('Error: ' + res.error.message);
                btn.innerHTML = originalText;
                lucide.createIcons();
            }
        };

        async function saveDraft() {
            const payload = { ...getFormData(), status: 'Draft' };
            let res;
            
            if (editingId) {
                res = await supabaseClient.from('po_logs').update(payload).eq('id', editingId);
            } else {
                res = await supabaseClient.from('po_logs').insert(payload);
            }
            
            if (!res.error) {
                alert('Draft saved successfully.');
                cancelEdit();
            } else {
                alert('Error saving draft: ' + res.error.message);
            }
        }

        async function deletePO(id) {
            if (!isAuthorized) return;
            
            if (confirm('Permanently delete this PO record? This action cannot be undone.')) {
                await supabaseClient.from('po_logs').delete().eq('id', id);
                fetchRecords();
            }
        }

        async function handleStatusChange(id, newStatus) {
            if (!currentApproverInitials) {
                alert('Account not mapped to approval matrix.');
                return;
            }
            
            const po = currentPOs.find(p => p.id === id);
            
            const { error } = await supabaseClient
                .from('po_logs')
                .update({ 
                    status: newStatus, 
                    approved_by: currentApproverInitials, 
                    approved_at: new Date().toISOString() 
                })
                .eq('id', id);
                
            if (error) {
                alert('Update Error: ' + error.message);
                return;
            }
            
            if (po) {
                const isApproved = newStatus === 'Approved';
                await triggerResendEmail(
                    `PO ${newStatus}`, 
                    isApproved ? '#2d6a27' : '#ef4444', 
                    { ...po, approved_by: currentApproverInitials }, 
                    isApproved ? 'Purchase Order approved. Proceed with supplier.' : 'Purchase Order rejected. Please modify and resubmit.'
                );
            }
            fetchRecords();
        }

        function loadForEdit(id) {
            const po = currentPOs.find(p => p.id === id);
            if (!po) return;
            
            editingId = id;
            document.getElementById('po-number').value = po.po_number;
            document.getElementById('po-date').value = po.date;
            document.getElementById('supplier-name').value = po.supplier_name;
            document.getElementById('supplier-contact').value = po.supplier_contact || '';
            document.getElementById('supplier-tel').value = po.supplier_tel || '';
            document.getElementById('project-ref').value = po.project_ref || '';
            document.getElementById('delivery-address').value = po.delivery_address || '';
            document.getElementById('remarks').value = po.remarks || '';
            
            document.getElementById('items-list').innerHTML = '';
            (po.items || []).forEach(item => addItemRow(item.description, item.qty, item.unit_price));
            
            document.getElementById('submit-text').innerText = 'Update & Resubmit';
            document.getElementById('cancel-edit-btn').classList.remove('hidden');
            
            switchTab('create');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            editingId = null;
            document.getElementById('po-form').reset();
            document.getElementById('items-list').innerHTML = '';
            document.getElementById('submit-text').innerText = 'Submit For Review';
            document.getElementById('cancel-edit-btn').classList.add('hidden');
            
            if (window.currentUserEmail) {
                 if (window.currentUserEmail === 'hiu.fs.itake@gmail.com') {
                    document.getElementById('req-name').value = 'Hiu Fu Shun';
                } else {
                    document.getElementById('req-name').value = window.currentUserEmail.split('@')[0];
                }
                document.getElementById('req-email').value = window.currentUserEmail;
            }

            addItemRow();
            setAutoPONumber();
            lucide.createIcons();
        }

        // ============================================================
        // EXPORTS (PDF / CSV) - WITH FULL WIDTH LETTERHEAD & TOP ADDRESS
        // ============================================================
        function buildPDF(poNo, date, supplier, contact, tel, projectRef, supplierAddress, remarks, items, total, status, approvedBy, approvedAt, isSaveAction = true) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            let currentY = 15;
            let headerRendered = false;

            // 1. Render Letterhead
            const logoEl = document.getElementById('pdf-logo');
            if (logoEl && logoEl.complete && logoEl.naturalWidth !== 0) {
                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = logoEl.naturalWidth;
                    canvas.height = logoEl.naturalHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(logoEl, 0, 0);
                    const dataUrl = canvas.toDataURL('image/jpeg', 1.0);
                    
                    const imgWidth = 182; // A4 Width minus margins
                    const imgHeight = (canvas.height * imgWidth) / canvas.width;

                    doc.addImage(dataUrl, 'JPEG', 14, 10, imgWidth, imgHeight);
                    currentY = 10 + imgHeight + 10;
                    headerRendered = true;
                } catch(e) {
                    console.log("Canvas error: ", e);
                }
            }

            if (!headerRendered) {
                doc.setFont('helvetica', 'bold').setFontSize(15).text(CO.name, 105, 20, { align: 'center' });
                doc.setFontSize(8).setFont('helvetica', 'normal');
                if (CO.reg) doc.text('Reg No: ' + CO.reg, 105, 26, { align: 'center' });
                const addrLines = doc.splitTextToSize(CO.address, 180);
                doc.text(addrLines, 105, 30, { align: 'center' });
                currentY = 30 + (addrLines.length * 4);
                doc.text(`Tel: ${CO.tel} | Email: ${CO.email}`, 105, currentY + 2, { align: 'center' });
                currentY += 15;
            }

            // 2. Document Title
            doc.setFont('helvetica', 'bold').setFontSize(16);
            doc.text('PURCHASE ORDER', 105, currentY, { align: 'center' });
            
            // Divider Line
            doc.setDrawColor(45, 106, 39).setLineWidth(0.5);
            doc.line(14, currentY + 4, 196, currentY + 4);

            currentY += 12;

            // 3. Supplier and PO Info (Left / Right Layout)
            let leftY = currentY;
            doc.setFontSize(10).setFont('helvetica', 'bold');
            doc.text('TO (SUPPLIER):', 14, leftY);
            leftY += 6;
            
            doc.setFont('helvetica', 'bold');
            doc.text(supplier || '-', 14, leftY);
            leftY += 5;
            
            doc.setFont('helvetica', 'normal').setFontSize(9);
            // STRICTLY PLACING ADDRESS AT THE TOP LEFT
            if (supplierAddress) {
                const addrLines = doc.splitTextToSize(supplierAddress, 90);
                doc.text(addrLines, 14, leftY);
                leftY += (addrLines.length * 4.5);
            }
            if (contact) { doc.text(`Attn: ${contact}`, 14, leftY); leftY += 5; }
            if (tel) { doc.text(`Tel/Email: ${tel}`, 14, leftY); leftY += 5; }

            let rightY = currentY;
            doc.setFontSize(10).setFont('helvetica', 'bold');
            doc.text('PO DETAILS:', 120, rightY);
            rightY += 6;
            
            doc.setFontSize(9).setFont('helvetica', 'normal');
            doc.text(`PO No:`, 120, rightY); 
            doc.setFont('helvetica', 'bold').text(poNo, 145, rightY); 
            doc.setFont('helvetica', 'normal');
            rightY += 6;
            
            doc.text(`Date:`, 120, rightY); 
            doc.text(date ? new Date(date).toLocaleDateString('en-GB') : '-', 145, rightY);
            rightY += 6;
            
            if (projectRef) { 
                doc.text(`Project Ref:`, 120, rightY); 
                doc.text(projectRef, 145, rightY); 
            }

            // 4. Render Table
            const startY = Math.max(leftY, rightY) + 8;
            
            doc.autoTable({
                startY: startY,
                head: [['No.', 'Description', 'Qty', 'Unit Price (RM)', 'Total (RM)']],
                body: items.map((item, idx) => [idx + 1, item.description, item.qty, formatRM(item.unit_price), formatRM(item.total)]),
                theme: 'grid',
                headStyles: { fillColor: [15, 23, 42], textColor: 255 },
                styles: { fontSize: 8 },
                columnStyles: { 
                    0: { halign: 'center', cellWidth: 15 }, 
                    2: { halign: 'center', cellWidth: 20 }, 
                    3: { halign: 'right' }, 
                    4: { halign: 'right' } 
                }
            });
            
            const finalY = doc.lastAutoTable.finalY;
            
            // 5. Totals & Footer Info
            doc.setFont('helvetica', 'bold').setFontSize(10);
            doc.text(`GRAND TOTAL: RM ${formatRM(total)}`, 196, finalY + 10, { align: 'right' });
            
            doc.setFont('helvetica', 'normal').setFontSize(8);
            let noteY = finalY + 20;
            
            if (remarks) {
                doc.setFont('helvetica', 'bold');
                doc.text('Remarks / T&C:', 14, noteY);
                doc.setFont('helvetica', 'normal');
                const remLines = doc.splitTextToSize(remarks, 180);
                doc.text(remLines, 14, noteY + 5);
            }
            
            if (status === 'PREVIEW') {
                doc.setTextColor(200, 50, 50);
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(12).text('DRAFT PREVIEW - UNAPPROVED', 196, finalY + 35, { align: 'right' });
                doc.setTextColor(0, 0, 0);
            } else if (status === 'Approved' && approvedBy) {
                const dt = approvedAt ? new Date(approvedAt).toLocaleString('en-GB') : '-';
                doc.setFontSize(8).setFont('helvetica', 'italic');
                doc.text(`Digitally approved by ${approvedBy} on ${dt}.`, 14, finalY + 40);
                doc.text(`System generated document. No physical signature required.`, 14, finalY + 44);
            }
            
            if (isSaveAction) {
                doc.save(`${poNo}.pdf`);
            } else {
                window.open(URL.createObjectURL(doc.output('blob')));
            }
        }

        function generatePDF(id) {
            const po = currentPOs.find(p => p.id === id);
            if (!po) return;
            
            buildPDF(po.po_number, po.date, po.supplier_name, po.supplier_contact, po.supplier_tel, po.project_ref, po.delivery_address, po.remarks, po.items || [], po.total, po.status, po.approved_by, po.approved_at, true);
        }

        function previewPDF() {
            const formData = getFormData();
            
            if (!formData.items.length) {
                alert('Cannot preview empty purchase order.');
                return;
            }
            
            buildPDF(
                formData.po_number || 'DRAFT',
                formData.date,
                formData.supplier_name || '-',
                formData.supplier_contact,
                formData.supplier_tel,
                formData.project_ref,
                formData.delivery_address, 
                formData.remarks,
                formData.items,
                formData.total,
                'PREVIEW',
                null, 
                null, 
                false
            );
        }

        async function exportCSV() {
            if (!isAuthorized) return;
            
            const { data } = await supabaseClient
                .from('po_logs')
                .select('*')
                .order('created_at', { ascending: false });
                
            const rows = ['PO No,Date,Supplier,Project Ref,Total (RM),Status,Approved By'];
            
            (data || []).forEach(po => {
                rows.push([
                    po.po_number,
                    po.date,
                    `"${po.supplier_name || ''}"`,
                    `"${po.project_ref || ''}"`,
                    parseFloat(po.total || 0).toFixed(2),
                    po.status,
                    po.approved_by || ''
                ].join(','));
            });
            
            const anchor = document.createElement('a');
            anchor.href = URL.createObjectURL(new Blob([rows.join('\n')], { type: 'text/csv' }));
            anchor.download = `CARBONEX_PO_${new Date().toISOString().split('T')[0]}.csv`;
            anchor.click();
        }

        init();
    </script>
