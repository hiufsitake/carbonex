                    <h1 class="font-black italic text-base uppercase tracking-tighter leading-none">CARBONEX <span class="text-[#3db87a] text-xs">Cash Claim</span></h1>

    <main class="max-w-4xl mx-auto p-4 mt-6">
        <div id="auth-lock-screen" class="hidden p-10 text-center bg-white rounded-[2.5rem] border shadow-sm space-y-4">
            <i data-lucide="shield-off" class="w-12 h-12 mx-auto text-red-400"></i>
            <h3 class="font-black text-lg uppercase italic text-slate-800">Access Restricted</h3>
            <p class="text-xs text-slate-500">This section is restricted to administrators only.</p>
        </div>

        <div id="tab-create">
            <form id="claim-form" class="space-y-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <section class="bg-white p-6 rounded-[2rem] shadow-sm border space-y-3">
                        <h2 class="font-black uppercase text-[10px] tracking-widest text-slate-400 italic">Claim Details</h2>
                        <input type="text" id="claim-no" class="input-box bg-slate-100 text-slate-500 font-black" readonly>
                        <input type="date" id="claim-date" class="input-box" required>
                        <input type="text" id="project-name" placeholder="Project / Reference" class="input-box" required>
                    </section>
                    <section class="bg-white p-6 rounded-[2rem] shadow-sm border space-y-3">
                        <h2 class="font-black uppercase text-[10px] tracking-widest text-slate-400 italic">Claimant</h2>
                        <input type="text" id="claimant-name" placeholder="Full Name" class="input-box" required>
                        <input type="email" id="claimant-email" placeholder="Email Address (Optional)" class="input-box">
                        <input type="text" id="claimant-nric" placeholder="NRIC No." class="input-box" required>
                        <input type="text" id="claimant-phone" placeholder="Phone No." class="input-box" required>

                <section class="bg-white p-6 rounded-[2rem] shadow-sm border space-y-3">

                    </div>
                </section>

                <section class="bg-white p-6 rounded-[2rem] shadow-sm border space-y-4">

                        <button type="button" onclick="addItemRow()" class="bg-[#f0faf5] text-[#1a6b4a] px-4 py-2 rounded-xl font-black text-[10px] uppercase flex items-center gap-1 shadow-sm hover:bg-[#1a6b4a] hover:text-white transition-all"><i data-lucide="plus-circle" class="w-3 h-3"></i> Add Item</button>

                    <button type="submit" id="submit-btn" class="w-2/3 bg-[#0d1f0d] text-white font-black p-6 rounded-[2.5rem] shadow-xl uppercase tracking-widest text-xs italic flex flex-col md:flex-row items-center justify-center gap-3 hover:bg-[#1a6b4a] transition-all">
                        <i data-lucide="send" class="w-5 h-5"></i> Submit Claim
                    </button>
                </div>
                <button type="button" onclick="saveDraft()" class="w-full bg-indigo-50 text-indigo-600 border border-indigo-100 font-black p-4 rounded-[2.5rem] shadow-sm uppercase tracking-widest text-[10px] italic flex items-center justify-center gap-2 hover:bg-indigo-100 transition-all">
                    <i data-lucide="file-edit" class="w-4 h-4"></i> Save as Draft
                </button>
                <button type="button" onclick="cancelEdit()" id="cancel-edit-btn" class="hidden w-full border-2 border-slate-200 text-slate-400 font-black p-4 rounded-[2.5rem] uppercase tracking-widest text-[10px] italic">Cancel Editing</button>
            </form>
        </div>

        <div id="tab-review" class="hidden"><div id="review-list" class="space-y-3"></div></div>
        <div id="tab-history" class="hidden"><div id="history-list" class="space-y-3"></div></div>
        <div id="tab-admin" class="hidden">
            <section class="bg-white p-8 rounded-[2.5rem] border shadow-sm space-y-6 text-center">
                <i data-lucide="settings" class="w-12 h-12 mx-auto text-[#1a6b4a]"></i>
                <button onclick="exportCSV()" class="w-full bg-[#0d1f0d] text-white p-5 rounded-3xl font-black uppercase text-xs tracking-widest shadow-lg flex items-center justify-center gap-3 hover:bg-[#1a6b4a] transition-all"><i data-lucide="download" class="w-5 h-5"></i> Export All Claims (CSV)</button>
            </section>

    <script>
        const SUPABASE_URL = 'https://bmsmgavlzboqnxxpekhl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtc21nYXZsemJvcW54eHBla2hsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NTE5NDgsImV4cCI6MjA5NDAyNzk0OH0.uCfN6_inw7WonvGT8Y2ahtTxbbqIcmrDGJas4bidEqM';
        const EMAIL_SERVICE  = 'service_0r59w66';
        const EMAIL_TEMPLATE = 'template_0ml31p9';
        const EMAIL_KEY      = 'mAu312S8UzSdtFZuk';
        const ADMIN_EMAILS   = ['hiu.fs.itake@gmail.com'];
        const APPROVER_MAP   = { 'hiu.fs.itake@gmail.com': 'HFS' };
        const CO = {
            name: 'CARBONEX VENTURES SDN. BHD.',
            reg:  'YOUR_SSM_REG_NUMBER',
            email:'carbonexventures2026@gmail.com',
            address:'Unit 906-3-04, Soon Hup Tower (2nd Floor), Jalan Maju, 98000 Miri, Sarawak, Malaysia.',
            tel:  '+6084-309 048 (Miri Office)'
        };

        const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
        const formatRM=n=>parseFloat(n||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});
        const mkRow=(l,v)=>`<tr><td style="padding:7px 0;color:#64748b;font-size:11px;font-weight:700">${l}</td><td style="padding:7px 0;color:#0f172a;font-size:13px;font-weight:700;text-align:right">${v}</td></tr>`;

        let currentClaims=[],isAuthorized=false,editingId=null,currentApproverInitials='';

        let inactivityTimeout;
        function resetIT(){clearTimeout(inactivityTimeout);inactivityTimeout=setTimeout(async()=>{await supabaseClient.auth.signOut();window.location.href='../index.html';},900000);}
        ['mousemove','keypress','click','scroll','touchstart'].forEach(e=>document.addEventListener(e,resetIT));
        resetIT();

        async function init(){
            emailjs.init(EMAIL_KEY);
            const{data:{session}}=await supabaseClient.auth.getSession();
            if(session&&ADMIN_EMAILS.includes(session.user.email))isAuthorized=true;
            if(session?.user)currentApproverInitials=APPROVER_MAP[session.user.email]||session.user.email.split('@')[0].toUpperCase().substring(0,3);
            addItemRow();setAutoCCNumber();lucide.createIcons();
        }

        async function setAutoCCNumber(){
            if(editingId)return;
            const now=new Date();
            const ds=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
            const{count}=await supabaseClient.from('cash_claims').select('*',{count:'exact',head:true}).gte('created_at',`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`);
            document.getElementById('claim-no').value=`CBX-CC-${ds}-${String((count||0)+1).padStart(2,'0')}`;
            document.getElementById('claim-date').value=now.toISOString().split('T')[0];
        }

        function switchTab(tab){
            const priv=['review','admin'];
            if(priv.includes(tab)&&!isAuthorized){
                document.querySelectorAll('main>div').forEach(d=>d.classList.add('hidden'));
                document.getElementById('auth-lock-screen').classList.remove('hidden');
            }else{
                document.getElementById('auth-lock-screen').classList.add('hidden');
                document.querySelectorAll('main>div').forEach(d=>d.classList.toggle('hidden',d.id!=='tab-'+tab));
                if(['review','history'].includes(tab))fetchRecords();
            }
            document.querySelectorAll('nav button').forEach(b=>{
                b.className=`px-3 py-2 rounded-lg text-[9px] font-bold uppercase transition-all ${b.id==='nav-'+tab?'tab-active':'text-slate-400'}`;
            });
            lucide.createIcons();
        }

        function renderLists(){
            document.getElementById('review-list').innerHTML=currentClaims.filter(c=>c.status==='Pending').map(cc=>`
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border space-y-4">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-black text-lg text-slate-900">${cc.claim_number}</h3>
                            <p class="text-[10px] font-bold text-slate-500 uppercase">${cc.claimant_name}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] font-bold text-slate-400 uppercase">Amount</p>
                            <p class="text-2xl font-black text-slate-900 leading-none">RM ${formatRM(cc.total_amount)}</p>
                            <button onclick="generatePDF('${cc.id}')" class="mt-2 bg-[#f0faf5] text-[#1a6b4a] px-3 py-1.5 rounded-full font-bold text-[9px] uppercase flex items-center gap-1 ml-auto"><i data-lucide="eye" class="w-3 h-3"></i> View</button>
                        </div>
                    </div>
                    <textarea id="reason-${cc.id}" placeholder="Feedback (Optional)" class="w-full bg-slate-50 border border-slate-100 rounded-xl p-3 text-xs font-medium outline-none" rows="2"></textarea>
                    <div class="bg-slate-50 px-4 py-2 rounded-xl text-[10px] font-bold text-center text-slate-700 uppercase tracking-widest">Action as <span class="text-[#1a6b4a]">${currentApproverInitials||'&mdash;'}</span></div>
                    <div class="flex gap-3">
                        <button onclick="handleStatusChange('${cc.id}','Approved')" class="flex-1 bg-[#1a6b4a] text-white py-3 rounded-xl font-bold text-xs uppercase hover:bg-[#0f4a32] transition-all">Approve</button>
                        <button onclick="handleStatusChange('${cc.id}','Rejected')" class="flex-1 bg-red-500 text-white py-3 rounded-xl font-bold text-xs uppercase hover:bg-red-600 transition-all">Reject</button>
                    </div>
                </div>`).join('')||'<div class="text-center p-10 text-slate-300 italic text-xs">Queue Clear</div>';

            document.getElementById('history-list').innerHTML=currentClaims.map(cc=>`
                <div class="bg-white p-5 rounded-[2rem] border shadow-sm flex justify-between items-center gap-2">
                    <div class="flex-1 min-w-0">
                        <h3 class="font-black text-slate-800 text-sm">${cc.claim_number}</h3>
                        <p class="text-[10px] font-bold text-slate-400 uppercase truncate">${cc.claimant_name} | RM ${formatRM(cc.total_amount)}</p>
                    </div>
                    <div class="flex items-center gap-2 shrink-0">
                        <span class="status-${cc.status.toLowerCase()} px-3 py-1 rounded-full text-[8px] font-black uppercase tracking-widest">${cc.status}</span>
                        ${cc.status==='Approved'?`<button onclick="generatePDF('${cc.id}')" class="p-2.5 bg-[#f0faf5] text-[#1a6b4a] rounded-xl"><i data-lucide="printer" class="w-4 h-4"></i></button>`:''}
                        ${(cc.status==='Rejected'||cc.status==='Draft')?`<button onclick="loadClaimForEdit('${cc.id}')" class="p-2.5 bg-blue-50 text-blue-600 rounded-xl"><i data-lucide="edit-3" class="w-4 h-4"></i></button>`:''}
                        ${isAuthorized?`<button onclick="deleteClaim('${cc.id}')" class="p-2.5 bg-red-50 text-red-400 rounded-xl hover:bg-red-500 hover:text-white transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>`:''}
                    </div>
                </div>`).join('');
            lucide.createIcons();
        }

        async function fetchRecords(){
            const{data}=await supabaseClient.from('cash_claims').select('*').order('created_at',{ascending:false});
            currentClaims=data||[];renderLists();
        }

        async function handleStatusChange(id,newStatus){
            if(!currentApproverInitials){alert('Your account is not mapped to an approver. Contact admin.');return;}
            const cc=currentClaims.find(c=>String(c.id)===String(id));
            const{error}=await supabaseClient.from('cash_claims').update({status:newStatus,approved_by:currentApproverInitials}).eq('id',id);
            if(error){alert('Database Error: '+error.message);return;}
            if(cc){const color=newStatus==='Approved'?'#1a6b4a':'#ef4444';emailjs.send(EMAIL_SERVICE,EMAIL_TEMPLATE,{system_name:'CARBONEX CASH CLAIM',header_bg:color,title:`Claim ${newStatus}`,to_email:cc.claimant_email,to_name:cc.claimant_name,html_body:mkRow('Claim No',cc.claim_number)+mkRow('Status',newStatus.toUpperCase())+mkRow('Action By',currentApproverInitials)+mkRow('Total','RM '+formatRM(cc.total_amount)),remark_text:document.getElementById('reason-'+id)?.value||(newStatus==='Approved'?'Claim approved.':'Claim rejected.')});}
            fetchRecords();
        }

        function loadClaimForEdit(id){
            const cc=currentClaims.find(c=>String(c.id)===String(id));if(!cc)return;
            editingId=id;
            document.getElementById('claim-no').value=cc.claim_number;
            document.getElementById('claim-date').value=cc.submission_date;
            document.getElementById('claimant-name').value=cc.claimant_name;
            document.getElementById('claimant-email').value=cc.claimant_email||'';
            document.getElementById('claimant-nric').value=cc.claimant_nric;
            document.getElementById('claimant-phone').value=cc.claimant_phone;
            document.getElementById('payable-name').value=cc.payable_name;
            document.getElementById('project-name').value=cc.project;
            document.getElementById('bank-details').value=cc.bank_details;
            document.getElementById('items-list').innerHTML='';
            cc.items.forEach(item=>{addItemRow();const rows=document.querySelectorAll('.item-row');const last=rows[rows.length-1];const inputs=last.querySelectorAll('input');inputs[0].value=item.desc;inputs[1].value=item.qty;inputs[2].value=item.price;});
            document.getElementById('submit-btn').innerHTML='<i data-lucide="save" class="w-5 h-5"></i> Update &amp; Resubmit';
            document.getElementById('cancel-edit-btn').classList.remove('hidden');
            lucide.createIcons();switchTab('create');window.scrollTo({top:0,behavior:'smooth'});
        }

        function cancelEdit(){
            editingId=null;
            document.getElementById('claim-form').reset();
            document.getElementById('items-list').innerHTML='';
            document.getElementById('submit-btn').innerHTML='<i data-lucide="send" class="w-5 h-5"></i> Submit Claim';
            document.getElementById('cancel-edit-btn').classList.add('hidden');
            addItemRow();setAutoCCNumber();lucide.createIcons();
        }

        function addItemRow(){
            const container=document.getElementById('items-list');
            const div=document.createElement('div');
            div.className='item-row grid grid-cols-12 gap-2 bg-slate-50 p-3 rounded-xl border border-slate-100 items-center';
            div.innerHTML=`<input type="text" placeholder="Description" class="col-span-8 bg-transparent font-bold text-[11px] outline-none" required><input type="number" placeholder="Qty" class="col-span-1 bg-transparent font-bold text-[11px] outline-none text-center" required><input type="number" step="0.01" placeholder="Price" class="col-span-2 bg-transparent font-bold text-[11px] outline-none text-right" required><button type="button" onclick="this.parentElement.remove()" class="col-span-1 text-red-300 hover:text-red-600 flex justify-center"><i data-lucide="trash-2" class="w-4 h-4"></i></button>`;
            container.appendChild(div);lucide.createIcons();
        }

        function buildPayload(status){
            const items=[];let sub=0;
            document.querySelectorAll('.item-row').forEach(row=>{const f=row.querySelectorAll('input');const qty=parseFloat(f[1].value)||0,pr=parseFloat(f[2].value)||0;sub+=qty*pr;items.push({desc:f[0].value,qty,price:pr});});
            return{
                claim_number:document.getElementById('claim-no').value,
                submission_date:document.getElementById('claim-date').value,
                claimant_name:document.getElementById('claimant-name').value,
                claimant_email:document.getElementById('claimant-email').value,
                claimant_nric:document.getElementById('claimant-nric').value,
                claimant_phone:document.getElementById('claimant-phone').value,
                payable_name:document.getElementById('payable-name').value,
                bank_details:document.getElementById('bank-details').value,
                project:document.getElementById('project-name').value,
                items,total_amount:sub,status
            };
        }

        async function saveDraft(){
            const payload=buildPayload('Draft');
            let res;
            if(editingId)res=await supabaseClient.from('cash_claims').update(payload).eq('id',editingId);
            else res=await supabaseClient.from('cash_claims').insert(payload);
            if(!res.error){alert('Draft saved.');cancelEdit();}else alert('Error: '+res.error.message);
        }

        async function deleteClaim(id){
            if(!isAuthorized){alert('Admin access required.');return;}
            if(confirm('Delete this claim?')){await supabaseClient.from('cash_claims').delete().eq('id',id);fetchRecords();}
        }

        async function exportCSV(){
            const{data}=await supabaseClient.from('cash_claims').select('*').order('created_at',{ascending:false});
            const rows=['Claim No,Date,Claimant,Payable To,Amount (RM),Status,Approved By'];
            (data||[]).forEach(cc=>rows.push([cc.claim_number,cc.submission_date,`"${cc.claimant_name}"`,`"${cc.payable_name}"`,parseFloat(cc.total_amount||0).toFixed(2),cc.status,cc.approved_by||''].join(',')));
            const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv'}));a.download='CARBONEX_CashClaims.csv';a.click();
        }

        function buildClaimPDF(data,preview=false){
            const{jsPDF}=window.jspdf;const doc=new jsPDF();
            doc.setFont('helvetica','bold').setFontSize(14).text(CO.name,14,25);
            doc.setFontSize(8).setFont('helvetica','normal');
            if(CO.reg&&CO.reg!=='YOUR_SSM_REG_NUMBER')doc.text('Reg No: '+CO.reg,14,30);
            const addr=doc.splitTextToSize(CO.address,100);doc.text(addr,14,34);
            const addrH=addr.length*4;
            doc.text('Tel: '+CO.tel+' | Email: '+CO.email,14,34+addrH);
            doc.setFont('helvetica','bold').text(`CASH CLAIM: ${data.claim_number}`,130,25);
            doc.text(`Date: ${new Date(data.submission_date).toLocaleDateString('en-GB')}`,130,30);
            doc.autoTable({startY:50+addrH,body:[['Claimant',data.claimant_name,'Payable To',data.payable_name],['NRIC',data.claimant_nric,'Project',data.project],['Phone',data.claimant_phone||'-','Email',data.claimant_email||'-'],[{content:'Bank Info',styles:{fontStyle:'bold'}},{content:data.bank_details,colSpan:3}]],theme:'plain',styles:{fontSize:9,cellPadding:1.5},columnStyles:{0:{fontStyle:'bold',width:25},2:{fontStyle:'bold',width:25}}});
            doc.autoTable({startY:doc.lastAutoTable.finalY+5,head:[['No.','Description','Qty','Unit Price (RM)','Total RM']],body:data.items.map((i,idx)=>[idx+1,i.desc,i.qty,formatRM(i.price),formatRM(i.qty*i.price)]),theme:'grid',headStyles:{fillColor:[13,31,13]},styles:{fontSize:8},columnStyles:{3:{halign:'right'},4:{halign:'right'}}});
            const finalY=doc.lastAutoTable.finalY;
            doc.setFont('helvetica','bold').text(`TOTAL: RM ${formatRM(data.total_amount)}`,196,finalY+10,{align:'right'});
            if(preview){doc.setTextColor(26,107,74);doc.text('PREVIEW — NOT SUBMITTED',196,finalY+20,{align:'right'});doc.setTextColor(0,0,0);}
            else if(data.approved_by)doc.setFontSize(8).setFont('helvetica','italic').text(`Digitally approved by ${data.approved_by}. No signature required.`,14,finalY+20);
            return doc;
        }

        async function generatePDF(id){
            const data=currentClaims.find(c=>String(c.id)===String(id));if(!data)return;
            buildClaimPDF(data,false).save(`${data.claim_number}.pdf`);
        }

        function previewPDF(){
            const items=[];let sub=0;
            document.querySelectorAll('.item-row').forEach(row=>{const f=row.querySelectorAll('input');const q=parseFloat(f[1].value)||0,p=parseFloat(f[2].value)||0;if(f[0].value||q){sub+=q*p;items.push({desc:f[0].value,qty:q,price:p});}});
            if(!items.length){alert('Please add at least one item.');return;}
            const data={claim_number:document.getElementById('claim-no').value||'DRAFT',submission_date:document.getElementById('claim-date').value||new Date().toISOString().split('T')[0],claimant_name:document.getElementById('claimant-name').value||'Claimant',claimant_email:document.getElementById('claimant-email').value||'-',claimant_nric:document.getElementById('claimant-nric').value||'-',claimant_phone:document.getElementById('claimant-phone').value||'-',payable_name:document.getElementById('payable-name').value||'-',project:document.getElementById('project-name').value||'-',bank_details:document.getElementById('bank-details').value||'-',items,total_amount:sub};
            window.open(URL.createObjectURL(buildClaimPDF(data,true).output('blob')));
        }

        document.getElementById('claim-form').onsubmit=async function(e){
            e.preventDefault();
            const payload=buildPayload('Pending');
            let res;
            if(editingId)res=await supabaseClient.from('cash_claims').update(payload).eq('id',editingId);
            else res=await supabaseClient.from('cash_claims').insert(payload);
            if(!res.error){
                emailjs.send(EMAIL_SERVICE,EMAIL_TEMPLATE,{system_name:'CARBONEX CASH CLAIM',header_bg:'#0d1f0d',title:editingId?'Claim Resubmitted':'New Cash Claim',html_body:mkRow('Claim No',payload.claim_number)+mkRow('Claimant',payload.claimant_name)+mkRow('Total','RM '+formatRM(payload.total_amount)),remark_text:'Please review via CARBONEX Portal.'});
                alert(editingId?'Claim Updated.':'Claim Submitted.');cancelEdit();
                if(isAuthorized)fetchRecords();
            }else alert('Error: '+res.error.message);
        };

        init();
    </script>
</body>
</html>
