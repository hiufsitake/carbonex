<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0d1f0d">
    <link rel="apple-touch-icon" href="../logo.png">
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <title>CARBONEX | Staff Claim</title>
    <script>
        document.documentElement.style.display='none';
        const GUARD_URL='YOUR_SUPABASE_URL';
        const GUARD_KEY='YOUR_SUPABASE_ANON_KEY';
        const guardClient=supabase.createClient(GUARD_URL,GUARD_KEY);
        async function checkSession(){const{data:{session}}=await guardClient.auth.getSession();if(!session)window.location.href='../index.html';else document.documentElement.style.display='';}
        checkSession();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body{font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;}
        .input-box{border:2px solid #f1f5f9;padding:1rem;border-radius:1.25rem;background:#f8fafc;font-weight:700;width:100%;outline:none;transition:all 0.2s;}
        .input-box:focus{border-color:#4a7a2d;background:white;}
        .tab-active{background:#4a7a2d;color:white;box-shadow:0 10px 15px -3px rgba(74,122,45,0.3);}
        .status-pending{background:#fef3c7;color:#92400e;}
        .status-approved{background:#dcfce7;color:#166534;}
        .status-rejected{background:#fee2e2;color:#991b1b;}
        .status-draft{background:#e0e7ff;color:#3730a3;}
        .item-num-badge{background:#0d1f0d;color:white;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:9px;font-weight:900;}
        .drag-over{border-color:#4a7a2d!important;background-color:rgba(74,122,45,0.1)!important;}
        .file-drop-zone *{pointer-events:none;}
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 text-slate-900 font-medium">

    <nav class="bg-[#0d1f0d] text-white p-5 sticky top-0 z-50 shadow-xl border-b-2 border-[#4a7a2d]">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <a href="../index.html" class="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white transition-all"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
                <div>
                    <h1 class="font-black italic text-base uppercase tracking-tighter leading-none">CARBONEX <span class="text-[#7db84a] text-xs">Staff Claim</span></h1>
                    <p class="text-[8px] text-slate-500 uppercase tracking-widest">Staff Reimbursement</p>
                </div>
            </div>
            <div class="flex bg-slate-800 p-1 rounded-xl gap-1 overflow-x-auto">
                <button onclick="switchTab('create')" id="nav-create" class="px-3 py-2 rounded-lg text-[9px] font-bold tab-active uppercase transition-all">Create</button>
                <button onclick="switchTab('review')" id="nav-review" class="px-3 py-2 rounded-lg text-[9px] font-bold text-slate-400 uppercase transition-all">Review</button>
                <button onclick="switchTab('history')" id="nav-history" class="px-3 py-2 rounded-lg text-[9px] font-bold text-slate-400 uppercase transition-all">Archive</button>
                <button onclick="switchTab('admin')" id="nav-admin" class="px-3 py-2 rounded-lg text-[9px] font-bold text-slate-400 uppercase transition-all">Admin</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 mt-6">
        <div id="auth-lock-screen" class="hidden p-10 text-center bg-white rounded-[2.5rem] border shadow-sm space-y-4">
            <i data-lucide="shield-off" class="w-12 h-12 mx-auto text-red-400"></i>
            <h3 class="font-black text-lg uppercase italic text-slate-800">Access Restricted</h3>
            <p class="text-xs text-slate-500">This section is restricted to administrators only.</p>
        </div>

        <div id="tab-create">
            <section id="ai-scan-container" class="mb-6 bg-[#0d1f0d] p-6 rounded-[2.5rem] shadow-xl border-t-4 border-[#4a7a2d] text-white">
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <h2 class="font-black uppercase text-[10px] tracking-widest text-[#7db84a] italic">SMART SCANNER</h2>
                        <p class="text-sm font-bold">AI Receipt Auto-Extraction</p>
                    </div>
                    <i data-lucide="sparkles" class="w-6 h-6 text-[#7db84a]"></i>
                </div>
                <div class="flex gap-3">
                    <label id="drop-zone" for="receipt-file" class="file-drop-zone flex-1 bg-white/5 border-2 border-dashed border-slate-500 hover:border-[#4a7a2d] hover:bg-[#4a7a2d]/10 p-8 rounded-2xl flex flex-col items-center justify-center cursor-pointer transition-all min-h-[120px]">
                        <i data-lucide="camera" class="w-8 h-8 mb-2 text-[#7db84a]"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest text-center text-slate-300">Drop PDF/Image Here<br><span class="text-[9px] font-medium text-slate-400 normal-case mt-1 inline-block">or click to browse</span></span>
                        <input type="file" id="receipt-file" accept="image/*,.pdf" class="hidden" multiple onchange="handleAIProcessing(this)">
                    </label>
                    <div id="ai-status" class="hidden flex-1 bg-[#4a7a2d]/10 border-2 border-[#4a7a2d]/20 p-4 rounded-2xl flex flex-col items-center justify-center gap-2">
                        <div class="w-4 h-4 border-2 border-[#4a7a2d] border-t-transparent rounded-full animate-spin"></div>
                        <span id="ai-status-text" class="text-[9px] font-black uppercase tracking-widest text-[#7db84a] text-center">Scanning...</span>
                    </div>
                </div>
            </section>

            <form id="claim-form" class="space-y-6">
                <input type="hidden" id="edit-id">
                <div class="grid md:grid-cols-2 gap-6">
                    <section class="bg-white p-6 rounded-[2rem] shadow-sm border space-y-3">
                        <h2 class="font-black uppercase text-[10px] tracking-widest text-slate-400 italic">Claim Details</h2>
                        <input type="text" id="claim-no" class="input-box bg-slate-100 text-slate-500 font-black" readonly>
                        <input type="date" id="submission-date" class="input-box" required>
                    </section>
                    <section class="bg-white p-6 rounded-[2rem] shadow-sm border space-y-3">
                        <h2 class="font-black uppercase text-[10px] tracking-widest text-slate-400 italic">Claimant</h2>
                        <input type="text" id="staff-name" placeholder="Staff Full Name" class="input-box" required>
                        <input type="email" id="staff-email" placeholder="Staff Email Address" class="input-box" required>
                    </section>
                </div>

                <section class="bg-white p-6 rounded-[2rem] shadow-sm border space-y-4">
                    <div class="flex justify-between items-center">
                        <h2 class="font-black uppercase text-[10px] tracking-widest text-slate-400 italic">Claim Items</h2>
                        <button type="button" onclick="addItemRow()" class="bg-[#f3f8ee] text-[#4a7a2d] px-4 py-2 rounded-xl font-black text-[10px] uppercase flex items-center gap-1 shadow-sm hover:bg-[#4a7a2d] hover:text-white transition-all"><i data-lucide="plus-circle" class="w-3 h-3"></i> Add Item</button>
                    </div>
                    <div id="items-list" class="space-y-3"></div>
                </section>

                <div class="flex gap-3">
                    <button type="button" onclick="previewPDF()" class="w-1/3 bg-[#f3f8ee] text-[#4a7a2d] border border-[#b8d99a] font-black p-6 rounded-[2.5rem] shadow-sm uppercase tracking-widest text-[10px] italic flex flex-col md:flex-row items-center justify-center gap-2 hover:bg-[#4a7a2d] hover:text-white transition-all">
                        <i data-lucide="eye" class="w-5 h-5"></i> Preview
                    </button>
                    <button type="submit" id="submit-btn" class="w-2/3 bg-[#0d1f0d] text-white font-black p-6 rounded-[2.5rem] shadow-xl uppercase tracking-widest text-xs italic flex flex-col md:flex-row items-center justify-center gap-3 hover:bg-[#4a7a2d] transition-all">
                        <i data-lucide="send" class="w-5 h-5"></i> <span id="submit-text">Submit Staff Claim</span>
                    </button>
                </div>
                <button type="button" onclick="saveDraft()" class="w-full bg-indigo-50 text-indigo-600 border border-indigo-100 font-black p-4 rounded-[2.5rem] shadow-sm uppercase tracking-widest text-[10px] italic flex items-center justify-center gap-2 hover:bg-indigo-100 transition-all">
                    <i data-lucide="file-edit" class="w-4 h-4"></i> Save as Draft
                </button>
                <button type="button" id="cancel-edit-btn" onclick="location.reload()" class="hidden w-full text-slate-400 font-black uppercase text-[10px] tracking-widest mt-2 hover:text-slate-600 transition-all">Cancel Resubmission</button>
            </form>
        </div>

        <div id="tab-review" class="hidden"><div id="review-list" class="space-y-4"></div></div>
        <div id="tab-history" class="hidden"><div id="history-list" class="space-y-3"></div></div>
        <div id="tab-admin" class="hidden">
            <section class="bg-white p-8 rounded-[2.5rem] border shadow-sm space-y-6 text-center">
                <i data-lucide="database" class="w-12 h-12 mx-auto text-[#4a7a2d]"></i>
                <button onclick="exportCSV()" class="w-full bg-[#0d1f0d] text-white p-5 rounded-3xl font-black uppercase text-xs tracking-widest shadow-lg flex items-center justify-center gap-3 hover:bg-[#4a7a2d] transition-all"><i data-lucide="download" class="w-5 h-5"></i> Export Database (CSV)</button>
            </section>
        </div>

        <footer class="text-center py-6 mt-6">
            <p class="text-[9px] font-black uppercase tracking-[0.5em] text-slate-300">CARBONEX VENTURES SDN. BHD. &nbsp;|&nbsp; 碳索未来</p>
            <p class="text-[9px] font-black uppercase tracking-[0.5em] text-slate-200">&copy; 2026 ALL RIGHTS RESERVED.</p>
        </footer>
    </main>

    <script>
        // ============================================================
        // CONFIGURATION — Replace with your credentials
        // ============================================================
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const EMAIL_SERVICE  = 'YOUR_EMAILJS_SERVICE_ID';
        const EMAIL_TEMPLATE = 'YOUR_EMAILJS_TEMPLATE_ID';
        const EMAIL_KEY      = 'YOUR_EMAILJS_PUBLIC_KEY';
        const GEMINI_API_KEY = 'YOUR_GEMINI_API_KEY'; // for AI receipt scanning
        const ADMIN_EMAILS   = ['admin@carbonexventures.com'];
        const APPROVER_MAP   = { 'admin@carbonexventures.com': 'ADMIN' };
        const CO = {
            name: 'CARBONEX VENTURES SDN. BHD.',
            reg:  'YOUR_REG_NUMBER',
            email:'admin@carbonexventures.com',
            address:'YOUR_COMPANY_ADDRESS',
            tel:  'YOUR_TELEPHONE'
        };
        // ============================================================

        const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
        const formatRM=n=>parseFloat(n||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});
        const mkRow=(l,v)=>`<tr><td style="padding:7px 0;color:#64748b;font-size:11px;font-weight:700">${l}</td><td style="padding:7px 0;color:#0f172a;font-size:13px;font-weight:700;text-align:right">${v}</td></tr>`;

        let currentClaims=[],isAuthorized=false,currentApproverInitials='';

        let inactivityTimeout;
        function resetIT(){clearTimeout(inactivityTimeout);inactivityTimeout=setTimeout(async()=>{await supabaseClient.auth.signOut();window.location.href='../index.html';},900000);}
        ['mousemove','keypress','click','scroll','touchstart'].forEach(e=>document.addEventListener(e,resetIT));
        resetIT();

        async function init(){
            emailjs.init(EMAIL_KEY);
            const{data:{session}}=await supabaseClient.auth.getSession();
            if(session&&ADMIN_EMAILS.includes(session.user.email))isAuthorized=true;
            if(session?.user){currentApproverInitials=APPROVER_MAP[session.user.email]||session.user.email.split('@')[0].toUpperCase().substring(0,3);fillClaimantData(session.user.email);}
            addItemRow();setAutoSCNumber();setupDropZone();lucide.createIcons();
        }

        async function fillClaimantData(email){
            document.getElementById('staff-email').value=email;
            const{data}=await supabaseClient.from('staff').select('name').eq('email',email).single();
            if(data?.name)document.getElementById('staff-name').value=data.name;
        }

        async function setAutoSCNumber(){
            const editId=document.getElementById('edit-id').value;
            if(editId)return;
            const now=new Date();
            const ym=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}`;
            const ds=`${ym}${String(now.getDate()).padStart(2,'0')}`;
            const{data}=await supabaseClient.from('staff_claims').select('claim_number').like('claim_number',`CBX-SC-${ym}%`).order('created_at',{ascending:false}).limit(1);
            let next=1;
            if(data?.length>0){const parts=data[0].claim_number.split('-');if(parts.length===4){const n=parseInt(parts[3],10);if(!isNaN(n))next=n+1;}}
            document.getElementById('claim-no').value=`CBX-SC-${ds}-${String(next).padStart(2,'0')}`;
            document.getElementById('submission-date').value=now.toISOString().split('T')[0];
        }

        function setupDropZone(){
            const dz=document.getElementById('drop-zone');
            if(!dz)return;
            ['dragenter','dragover','dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();},false));
            ['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev,()=>dz.classList.add('drag-over'),false));
            ['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,()=>dz.classList.remove('drag-over'),false));
            dz.addEventListener('drop',e=>{if(e.dataTransfer.files.length){const fi=document.getElementById('receipt-file');fi.files=e.dataTransfer.files;handleAIProcessing(fi);}});
        }

        async function handleAIProcessing(input){
            const files=input.files;if(!files.length)return;
            const statusEl=document.getElementById('ai-status');
            const statusText=document.getElementById('ai-status-text');
            statusEl.classList.remove('hidden');
            input.parentElement.classList.add('hidden');
            for(let i=0;i<files.length;i++){
                const file=files[i];
                statusText.innerText=`Scanning (${i+1}/${files.length})...`;
                try{
                    const mime=file.type||(file.name.toLowerCase().endsWith('.pdf')?'application/pdf':'image/jpeg');
                    const upRes=await fetch(`https://generativelanguage.googleapis.com/upload/v1beta/files?key=${GEMINI_API_KEY}`,{method:'POST',headers:{'X-Goog-Upload-Protocol':'raw','X-Goog-Upload-Header-Content-Type':mime,'Content-Type':mime},body:file});
                    const upData=await upRes.json();
                    const fileUri=upData.file.uri;
                    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:'Extract receipt data. Return ONLY raw JSON with keys: merchant, receipt_amount, receipt_currency, receipt_date, category (e.g. Car Fuel, Meals, Transport, Phone Bill, Accommodation, Hardware). No markdown.'},{fileData:{mimeType:mime,fileUri}}]}],generationConfig:{responseMimeType:'application/json'}}})});
                    const result=await res.json();
                    let raw=result.candidates[0].content.parts[0].text.replace(/```json/g,'').replace(/```/g,'').trim();
                    const data=JSON.parse(raw);
                    const rows=document.querySelectorAll('.item-row');
                    if(rows.length===1&&rows[0].querySelectorAll('input')[0].value==='')rows[0].remove();
                    addItemRow(data.merchant||'Vendor',parseFloat(data.receipt_amount||0).toFixed(2),'',data.category||'General Expense');
                }catch(err){console.error('Scan error:',err);}
            }
            statusEl.classList.add('hidden');
            input.parentElement.classList.remove('hidden');
            input.value='';
        }

        function addItemRow(vendor='',amount='',project='',remarks=''){
            const container=document.getElementById('items-list');
            const div=document.createElement('div');
            div.className='item-row grid grid-cols-12 gap-2 bg-slate-50 p-3 rounded-xl border border-slate-100 items-center';
            div.innerHTML=`<div class="col-span-1 flex justify-center"><span class="item-num-badge item-num-text"></span></div>
                <input type="text" placeholder="Vendor" value="${vendor}" class="col-span-3 bg-transparent font-bold text-[10px] outline-none" required>
                <input type="number" step="0.01" placeholder="Amount" value="${amount}" class="col-span-2 bg-transparent font-bold text-[10px] outline-none text-right" required>
                <input type="text" placeholder="Project No." value="${project}" class="col-span-2 bg-transparent font-bold text-[10px] outline-none text-center">
                <input type="text" placeholder="Remarks" value="${remarks}" class="col-span-3 bg-transparent font-bold text-[10px] outline-none" required>
                <button type="button" onclick="this.parentElement.remove();updateItemNums();" class="col-span-1 text-red-300 hover:text-red-600 flex justify-center"><i data-lucide="trash-2" class="w-3 h-3"></i></button>`;
            container.appendChild(div);updateItemNums();lucide.createIcons();
        }

        function updateItemNums(){document.querySelectorAll('.item-num-text').forEach((el,i)=>el.innerText=i+1);}

        function switchTab(tab){
            const priv=['review','admin'];
            if(priv.includes(tab)&&!isAuthorized){document.querySelectorAll('main>div').forEach(d=>d.classList.add('hidden'));document.getElementById('auth-lock-screen').classList.remove('hidden');}
            else{document.getElementById('auth-lock-screen').classList.add('hidden');document.querySelectorAll('main>div').forEach(d=>d.classList.toggle('hidden',d.id!=='tab-'+tab));if(['review','history','admin'].includes(tab))fetchRecords();}
            document.querySelectorAll('nav button').forEach(b=>{b.className=`px-3 py-2 rounded-lg text-[9px] font-bold uppercase transition-all ${b.id==='nav-'+tab?'tab-active':'text-slate-400'}`;});
            lucide.createIcons();
        }

        async function fetchRecords(){
            const{data}=await supabaseClient.from('staff_claims').select('*').order('created_at',{ascending:false});
            currentClaims=data||[];
            renderReview();renderHistory();
        }

        function renderReview(){
            document.getElementById('review-list').innerHTML=currentClaims.filter(c=>c.status==='Pending').map(pc=>`
                <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm space-y-4">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-black text-lg text-slate-900 uppercase">${pc.staff_name}</h3>
                            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">${pc.claim_number}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[8px] font-black text-slate-300 uppercase">Total Claim</p>
                            <p class="font-black text-2xl text-slate-900 leading-none">RM ${formatRM(pc.total_amount)}</p>
                            <button onclick="generatePDF('${pc.id}')" class="text-[9px] text-[#4a7a2d] font-bold uppercase mt-1 hover:underline flex items-center justify-end gap-1 ml-auto"><i data-lucide="eye" class="w-3 h-3"></i> View</button>
                        </div>
                    </div>
                    <textarea id="reason-${pc.id}" rows="2" class="w-full bg-slate-50 border border-slate-100 rounded-xl p-3 text-xs font-medium text-slate-600 outline-none focus:border-[#4a7a2d] transition-all placeholder:italic" placeholder="Approval/Rejection Remarks..."></textarea>
                    <div class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-[10px] font-bold text-center text-slate-700 uppercase tracking-widest">Action as <span class="text-[#4a7a2d]">${currentApproverInitials||'&mdash;'}</span></div>
                    <div class="flex gap-3">
                        <button onclick="handleStatusChange('${pc.id}','Approved')" class="flex-1 bg-[#4a7a2d] text-white py-3 rounded-xl font-bold text-xs uppercase hover:bg-[#2d5a1a] transition-all">Approve</button>
                        <button onclick="handleStatusChange('${pc.id}','Rejected')" class="flex-1 bg-red-500 text-white py-3 rounded-xl font-bold text-xs uppercase hover:bg-red-600 transition-all">Reject</button>
                    </div>
                </div>`).join('')||'<div class="text-center p-10 text-slate-300 italic text-xs">Queue Clear</div>';
            lucide.createIcons();
        }

        function renderHistory(){
            document.getElementById('history-list').innerHTML=currentClaims.map(pc=>`
                <div class="bg-white p-5 rounded-[2rem] border shadow-sm flex justify-between items-center gap-2">
                    <div class="flex-1 min-w-0">
                        <h3 class="font-black text-slate-800 text-sm">${pc.claim_number}</h3>
                        <p class="text-[10px] font-bold text-slate-400 uppercase truncate">${pc.staff_name} | RM ${formatRM(pc.total_amount)}</p>
                    </div>
                    <div class="flex items-center gap-2 shrink-0">
                        <span class="status-${pc.status.toLowerCase()} px-3 py-1 rounded-full text-[8px] font-black uppercase tracking-widest">${pc.status}</span>
                        ${(pc.status==='Rejected'||pc.status==='Draft')?`<button onclick="loadForEdit('${pc.id}')" class="p-2.5 bg-indigo-50 text-indigo-600 rounded-xl"><i data-lucide="edit-3" class="w-4 h-4"></i></button>`:''}
                        <button onclick="generatePDF('${pc.id}')" class="p-2.5 bg-[#f3f8ee] text-[#4a7a2d] rounded-xl hover:bg-[#4a7a2d] hover:text-white transition-all"><i data-lucide="printer" class="w-4 h-4"></i></button>
                        ${isAuthorized?`<button onclick="deleteClaim('${pc.id}')" class="p-2.5 bg-red-50 text-red-400 rounded-xl hover:bg-red-500 hover:text-white transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>`:''}
                    </div>
                </div>`).join('');
            lucide.createIcons();
        }

        async function handleStatusChange(id,newStatus){
            if(!currentApproverInitials){alert('Your account is not mapped to an approver.');return;}
            const now=new Date().toLocaleString('en-GB');
            const remark=document.getElementById('reason-'+id)?.value||'';
            const{error}=await supabaseClient.from('staff_claims').update({status:newStatus,approved_by:currentApproverInitials,approved_at:now}).eq('id',id);
            if(error){alert('Error: '+error.message);return;}
            const pc=currentClaims.find(c=>c.id===id);
            if(pc){const color=newStatus==='Approved'?'#4a7a2d':'#ef4444';emailjs.send(EMAIL_SERVICE,EMAIL_TEMPLATE,{system_name:'CARBONEX STAFF CLAIM',header_bg:color,title:`Staff Claim ${newStatus}`,to_email:pc.staff_email,html_body:mkRow('Claim No',pc.claim_number)+mkRow('Status',newStatus.toUpperCase())+mkRow('Action By',currentApproverInitials)+mkRow('Total','RM '+formatRM(pc.total_amount)),remark_text:remark||(newStatus==='Approved'?'Claim approved.':'Claim rejected.')});}
            fetchRecords();
        }

        function loadForEdit(id){
            const pc=currentClaims.find(c=>c.id===id);if(!pc)return;
            document.getElementById('edit-id').value=pc.id;
            document.getElementById('staff-name').value=pc.staff_name;
            document.getElementById('staff-email').value=pc.staff_email;
            document.getElementById('claim-no').value=pc.claim_number;
            document.getElementById('submission-date').value=pc.submission_date;
            document.getElementById('items-list').innerHTML='';
            pc.items.forEach(i=>addItemRow(i.vendor,i.amount,i.project,i.remarks));
            document.getElementById('submit-text').innerText='Resubmit Corrected Claim';
            document.getElementById('cancel-edit-btn').classList.remove('hidden');
            switchTab('create');window.scrollTo({top:0,behavior:'smooth'});
        }

        async function deleteClaim(id){
            if(!isAuthorized){alert('Admin access required.');return;}
            if(confirm('Delete this claim?')){await supabaseClient.from('staff_claims').delete().eq('id',id);fetchRecords();}
        }

        function getItems(){const items=[];let total=0;document.querySelectorAll('.item-row').forEach(r=>{const f=r.querySelectorAll('input');const amt=parseFloat(f[1].value)||0;total+=amt;items.push({vendor:f[0].value,amount:amt,project:f[2].value,remarks:f[3].value});});return{items,total};}

        async function saveDraft(){
            const{items,total}=getItems();
            const payload={claim_number:document.getElementById('claim-no').value,staff_name:document.getElementById('staff-name').value,staff_email:document.getElementById('staff-email').value,submission_date:document.getElementById('submission-date').value||new Date().toISOString().split('T')[0],submitted_at:new Date().toLocaleString('en-GB'),items,total_amount:total,status:'Draft'};
            const editId=document.getElementById('edit-id').value;
            let error;
            if(editId){const r=await supabaseClient.from('staff_claims').update(payload).eq('id',editId);error=r.error;}
            else{const r=await supabaseClient.from('staff_claims').insert(payload);error=r.error;}
            if(!error){alert('Draft saved.');location.reload();}else alert('Error: '+error.message);
        }

        async function exportCSV(){
            if(!isAuthorized){alert('Admin access required.');return;}
            const rows=['Claim No,Staff,Email,Total (RM),Status,Date'];
            currentClaims.forEach(pc=>rows.push([pc.claim_number,`"${pc.staff_name}"`,pc.staff_email,parseFloat(pc.total_amount||0).toFixed(2),pc.status,pc.submission_date].join(',')));
            const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv'}));a.download='CARBONEX_StaffClaims.csv';a.click();
        }

        function buildPDF(data,preview=false){
            const{jsPDF}=window.jspdf;const doc=new jsPDF();
            doc.setFont('helvetica','bold').setFontSize(14).text(CO.name,14,25);
            doc.setFontSize(8).setFont('helvetica','normal');
            if(CO.reg&&CO.reg!=='YOUR_REG_NUMBER')doc.text('Reg No: '+CO.reg,14,30);
            doc.text(doc.splitTextToSize(CO.address,100),14,34);
            doc.text('Tel: '+CO.tel+' | Email: '+CO.email,14,42);
            doc.line(14,45,196,45);
            doc.setFontSize(12).setFont('helvetica','bold').text('CARBONEX — STAFF CLAIM FORM',14,55);
            doc.setFontSize(10).text(`Ref No: ${data.claim_number}`,196,55,{align:'right'});
            doc.setFontSize(9).text(`Name: ${data.staff_name} (${data.staff_email})`,14,65);
            doc.text(`Date: ${new Date(data.submission_date).toLocaleDateString('en-GB')}`,150,65);
            doc.autoTable({startY:70,head:[['NO.','VENDOR','AMOUNT (RM)','PROJECT NO.','REMARKS']],body:data.items.map((i,idx)=>[idx+1,(i.vendor||'').toUpperCase(),formatRM(i.amount),(i.project||'-').toUpperCase(),(i.remarks||'').toUpperCase()]),theme:'grid',headStyles:{fillColor:[240,240,240],textColor:[0,0,0]},styles:{fontSize:8}});
            const finalY=doc.lastAutoTable.finalY;
            doc.setFont('helvetica','bold').text(`Total: RM ${formatRM(data.total_amount)}`,196,finalY+10,{align:'right'});
            if(preview){doc.setTextColor(74,122,45);doc.text('PREVIEW — NOT SUBMITTED',196,finalY+20,{align:'right'});doc.setTextColor(0,0,0);}
            else if(data.approved_by)doc.setFontSize(8).setFont('helvetica','italic').text(`Digitally approved by ${data.approved_by} on ${data.approved_at||'-'}. No signature required.`,14,finalY+20);
            return doc;
        }

        async function generatePDF(id){
            const data=currentClaims.find(c=>c.id===id);if(!data)return;
            buildPDF(data,false).save(`${data.claim_number}.pdf`);
        }

        function previewPDF(){
            const{items,total}=getItems();
            if(!items.length){alert('Please add at least one item.');return;}
            const data={claim_number:document.getElementById('claim-no').value||'DRAFT',submission_date:document.getElementById('submission-date').value||new Date().toISOString().split('T')[0],staff_name:document.getElementById('staff-name').value||'Staff Name',staff_email:document.getElementById('staff-email').value||'',items,total_amount:total};
            window.open(URL.createObjectURL(buildPDF(data,true).output('blob')));
        }

        document.getElementById('claim-form').onsubmit=async function(e){
            e.preventDefault();
            const{items,total}=getItems();
            const payload={claim_number:document.getElementById('claim-no').value,staff_name:document.getElementById('staff-name').value,staff_email:document.getElementById('staff-email').value,submission_date:document.getElementById('submission-date').value,submitted_at:new Date().toLocaleString('en-GB'),items,total_amount:total,status:'Pending'};
            const editId=document.getElementById('edit-id').value;
            let error;
            if(editId){const r=await supabaseClient.from('staff_claims').update(payload).eq('id',editId);error=r.error;}
            else{const r=await supabaseClient.from('staff_claims').insert(payload);error=r.error;}
            if(!error){
                emailjs.send(EMAIL_SERVICE,EMAIL_TEMPLATE,{system_name:'CARBONEX STAFF CLAIM',header_bg:'#0d1f0d',title:editId?'Claim Resubmitted':'New Staff Claim',html_body:mkRow('Claimant',payload.staff_name)+mkRow('Total','RM '+formatRM(payload.total_amount)),remark_text:'Please review via CARBONEX Portal.'});
                alert(editId?'Resubmitted successfully.':'Submitted successfully.');location.reload();
            }else alert('Error: '+error.message);
        };

        init();
    </script>
</body>
</html>
