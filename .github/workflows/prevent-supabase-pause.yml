name: Prevent Supabase Pause

on:
  schedule:
    # Runs every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    # This ensures multiple activity logs per day
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PROJECT_ID: bmsmgavlzboqnxxpekhl
        run: |
          echo "Pinging Supabase Project: $PROJECT_ID..."
          
          RESPONSE_FILE=$(mktemp)
          
          HTTP_STATUS=$(curl -s -w "%{http_code}" \
            -o "$RESPONSE_FILE" \
            -X GET "https://$PROJECT_ID.supabase.co/rest/v1/" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY")

          RESPONSE_BODY=$(cat "$RESPONSE_FILE")

          # Accepting 200-499 as successful activity
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 500 ]; then
            echo "Success! Activity logged. Status: $HTTP_STATUS"
          else
            echo "FAILED! Status: $HTTP_STATUS"
            echo "Details: $RESPONSE_BODY"
            exit 1
          fi
